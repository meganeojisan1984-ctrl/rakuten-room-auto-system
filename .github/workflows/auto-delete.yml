name: 楽天ROOM 自動投稿削除

on:
  schedule:
    # JST 毎週日曜 03:00 → UTC 土曜 18:00
    - cron: "0 18 * * 6"
  workflow_dispatch:
    inputs:
      max_deletes:
        description: "最大削除数（0=全件）"
        required: false
        default: "10"

jobs:
  auto-delete:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存関係をインストール
        run: npm ci

      - name: Playwright Chromium をインストール
        run: npx playwright install chromium --with-deps

      - name: 自動削除を実行
        env:
          CI: "true"
          ROOM_COOKIE: ${{ secrets.ROOM_COOKIE }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MAX_DELETES: ${{ github.event.inputs.max_deletes || vars.MAX_DELETES || '10' }}
        run: npx tsx src/run_delete.ts

      - name: エラースクリーンショット（失敗時）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: delete-error-${{ github.run_id }}
          path: error.png
          retention-days: 7
          if-no-files-found: ignore
